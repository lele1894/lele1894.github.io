name: Update YouTube Trending

on:
  workflow_dispatch:  # 手动触发
    inputs:
      message:
        description: '手动触发更新'
        required: false
  schedule:
    - cron: "0 */4 * * *"  # 修正：每 4 小时运行一次 (0:00, 4:00, 8:00...)

# 防止多个作业同时运行导致冲突
concurrency:
  group: youtube-update
  cancel-in-progress: true

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    # 关键：设置单次作业最长运行时间，防止卡死
    timeout-minutes: 5 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.11'     # 升级到 3.11 消除 FutureWarning

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client googletrans==4.0.0-rc1 jinja2 tzdata

      - name: Run trending script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TZ: 'Asia/Shanghai'
        # 使用 -u 参数强制不缓存日志输出，方便在 Actions 页面实时看到进度
        run: python -u main.py
        shell: bash

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 检查是否有文件变动
          git add us.html hk.html tw.html index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update trending videos at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
